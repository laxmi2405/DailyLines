<!DOCTYPE html>
<html>
<head>
    <title>Delete Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow-lg mx-auto" style="max-width: 500px;">
        <h3 class="text-danger">Are you sure?</h3>
        <p>Do you want to delete: <strong>{{ post.title }}</strong>?</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100">Yes, Delete</button>
        </form>

        <a href="{% url 'post_details' post.id %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
    </div>
</div>

</body>
</html>
