<!DOCTYPE html>
<html>
<head>
    <title>My Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">My Posts</h2>

    {% if posts %}
    <div class="row">
        {% for post in posts %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-lg">

                    {% if post.image %}
                        <img src="{{ post.image.url }}" class="card-img-top" alt="Post Image">
                    {% endif %}

                    <div class="card-body">
                        <h5 class="card-title">{{ post.title }}</h5>
                        <p class="text-muted">{{ post.category.name }}</p>
                        <p class="card-text">{{ post.content|slice:":90" }}...</p>

                        <a href="{% url 'post_details' post.id %}" class="btn btn-primary w-100 mb-2">
                            View
                        </a>
                        <a href="{% url 'edit_post' post.id %}" class="btn btn-warning w-100 mb-2">
                            Edit
                        </a>
                        <a href="{% url 'delete_post' post.id %}" class="btn btn-danger w-100">
                            Delete
                        </a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
    {% else %}
        <p>You have not created any posts yet.</p>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
